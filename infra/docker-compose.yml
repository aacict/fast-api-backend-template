services:
  api:
    build:
      context: ..
      dockerfile: infra/Dockerfile
    container_name: api
    ports:
      - "8000:8000"
    networks:
      - backend-network
  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - backend-network

networks:
  backend-network:
    driver: bridge