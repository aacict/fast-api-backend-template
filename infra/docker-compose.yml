services:
  api:
    build:
      context: ..
      dockerfile: infra/Dockerfile
    env_file:
      - ../.env 
    container_name: api
    ports:
      - "8000:8000"
    depends_on:
      - prometheus
      - grafana
    networks:
      - backend-network
  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - backend-network
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"  # access Grafana in browser
    depends_on:
      - prometheus
    networks:
      - backend-network
    volumes:
      - grafana-data:/var/lib/grafana  # persistence
  loki:
    image: grafana/loki:2.9.1
    container_name: loki
    ports:
      - "3100:3100"
    volumes:
      - ./monitoring/loki-config.yaml:/etc/loki/config.yaml:ro
      - loki-config:/etc/loki       
      - loki-data:/var/loki             
    command: -config.file=/etc/loki/config.yaml
    networks:
      - backend-network
  promtail:
    image: grafana/promtail:2.9.1
    container_name: promtail
    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - ./monitoring/promtail-config.yaml:/etc/promtail/config.yaml
    command: -config.file=/etc/promtail/config.yaml
    depends_on:
      - loki
    networks:
      - backend-network
      
volumes:
  prometheus-data:
  grafana-data:
  loki-data:
  loki-config:

networks:
  backend-network:
    driver: bridge